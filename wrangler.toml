name = "zhostbidan"
main = "worker/index.ts"
compatibility_date = "2026-03-31"

[build]
command = "npm run build:worker-assets"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
APP_ENV = "production"
ALLOWED_ORIGIN = "zhostbidan.magicsoapid.workers.dev"
GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbyTIhK1x1YzvW-ihk0BAjIBF4gkVqVBh2gDqE2IFc1Uy7RR4Re4KQFaRvIQZI2tMyt3uw/exec"
API_TIMEOUT_MS = "30000"
